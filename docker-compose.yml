services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mjdcbproject-app
    container_name: mjdcb-app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    # We override DB_HOST to point to the docker-compose database service explicitly
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mjdcb-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mjdcbproject}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306" # Optional: allows you to connect a local GUI tool to the db
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

