services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mjdcbproject-app
    container_name: mjdcb-app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      PORT: 80
      DB_HOST: db
      DB_CONNECTION: mysql
      DB_DATABASE: ${DB_DATABASE:-mjdcbproject}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int) !@file_get_contents('http://127.0.0.1:80/up'));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  migrate:
    image: mjdcbproject-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mjdcb-migrate
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_CONNECTION: mysql
      DB_DATABASE: ${DB_DATABASE:-mjdcbproject}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    command: ["docker-predeploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: mysql:8.0
    container_name: mjdcb-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mjdcbproject}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
